name: CamFusion
version: "0.1.1"
slug: camfusion
description: Composite 2-4 camera sources into a single panoramic MJPEG feed.
url: https://example.com/camfusion
startup: services
boot: auto
init: false
arch:
  - aarch64
  - amd64
  - armv7
homeassistant_api: true
hassio_api: true
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Panorama feed HTTP API
map:
  - media:ro
options:
  mode: dashboard
  fps: 3
  layout: hstack
  output_width: 1280
  output_height: 0
  inputs:
    - type: rtsp
      url: rtsp://wowzaec2demo.streamlock.net/vod/mp4:BigBuckBunny_115k.mov
      crop:
        left: 0
        right: 0
        top: 0
        bottom: 0
      scale: 1.0
    - type: file
      path: /media/demo.mp4
      crop:
        left: 0
        right: 0
        top: 0
        bottom: 0
      scale: 1.0
schema:
  mode: list(dashboard|live|experimental)
  fps: int(1,15)
  layout: list(hstack|2x2|3x1)
  output_width: int(640,3840)
  output_height: int(0,2160)
  blend_feather_px: int(0,200)?
  inputs:
    - type: list(rtsp|ha_camera|file|ring)
      url: str?
      entity_id: str?
      path: str?
      account: str?
      device_id: int?
      device_name: str?
      snapshot_retries: int?
      snapshot_delay: int?
      warp_affine: str?
      warp_perspective: str?
      scale: float?
      crop:
        left: float?
        right: float?
        top: float?
        bottom: float?
